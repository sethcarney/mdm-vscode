<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Central node -->
  <circle cx="12" cy="12" r="2.5"/>
  <!-- Top node -->
  <circle cx="12" cy="3.5" r="2"/>
  <!-- Bottom-left node -->
  <circle cx="4.5" cy="18.5" r="2"/>
  <!-- Bottom-right node -->
  <circle cx="19.5" cy="18.5" r="2"/>
  <!-- Connector: center to top -->
  <rect x="11.4" y="5.5" width="1.2" height="4.2" rx="0.6"/>
  <!-- Connector: center to bottom-left -->
  <rect x="7.2" y="14.1" width="1.2" height="4.5" rx="0.6" transform="rotate(-30 7.8 16.35)"/>
  <!-- Connector: center to bottom-right -->
  <rect x="14.6" y="14.1" width="1.2" height="4.5" rx="0.6" transform="rotate(30 15.2 16.35)"/>
</svg>
